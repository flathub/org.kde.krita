app-id: org.kde.krita
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: krita
rename-icon: krita
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=host
  - --filesystem=xdg-run/gvfs
  - --env=PYTHONPATH=/app/lib/python3.10/site-packages
  - --env=LADSPA_PATH=/app/extensions/Plugins/ladspa:/app/lib/ladspa
  - --env=TMPDIR=/var/tmp
  - --env=QT_QPA_PLATFORMTHEME=gtk3
  - --env=FLATPAK=1
  - --system-talk-name=org.freedesktop.ColorManager
  - --talk-name=com.canonical.AppMenu.Registrar
cleanup:
  - /doc
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /lib/mkspecs
  - /share/aclocal
  - /share/cmake
  - /share/doc
  - /share/pkgconfig
  - /share/info
  - /share/man
  - /cmake
  - '*.a'
  - '*.la'
  - '*.cmake'
  - '*.prl'
cleanup-commands:
  - mkdir -p ${FLATPAK_DEST}/extensions/Plugins
add-extensions:
  org.freedesktop.LinuxAudio.Plugins:
    directory: extensions/Plugins
    version: '25.08'
    add-ld-path: lib
    merge-dirs: ladspa
    subdirectories: true
    no-autodownload: true
  org.freedesktop.LinuxAudio.Plugins.swh:
    directory: extensions/Plugins/swh
    version: '25.08'
    add-ld-path: lib
    merge-dirs: ladspa
    autodelete: false
    subdirectories: true
  org.freedesktop.LinuxAudio.Plugins.TAP:
    directory: extensions/Plugins/TAP
    version: '25.08'
    add-ld-path: lib
    merge-dirs: ladspa
    autodelete: false
    subdirectories: true
build-options:
  env:
    CMAKE_BUILD_TYPE: RelWithDebInfo
modules:
  - name: qtbase
    buildsystem: cmake-ninja
    config-opts:
      - -DINSTALL_ARCHDATADIR=lib
      - -DQT_DISABLE_RPATH=ON
      - -DBUILD_WITH_PCH=FALSE
      - -DQT_FEATURE_openssl_linked=ON
      - -DQT_FEATURE_system_sqlite=ON
      - -DFEATURE_mimetype_database=OFF
    cleanup:
      - /bin
    sources:
      # See link for current Krita Qt fork and git tag https://invent.kde.org/packaging/krita-deps-management/-/blob/transition.now/qt6/ext_qt/CMakeLists.txt?ref_type=heads
      - type: git
        url: https://invent.kde.org/dkazakov/qtbase.git
        commit: 0da6f39761c964b62a56d41092b8260f75394140
      - type: patch
        paths:
          - patches/qtbase/qtbase-find_package-paths.patch
  - name: qtdeclarative
    buildsystem: cmake-ninja
    config-opts:
      - -DQT_TOOL_COMMAND_WRAPPER_PATH=env
    cleanup:
      - /bin
      - /lib/plugins/qmltooling
    sources:
      - type: git
        url: https://invent.kde.org/dkazakov/qtdeclarative.git
        commit: 3c797fa613418cf201fee47ec9d70b8577d632e6
        disable-shallow-clone: true
        disable-submodules: true
  - name: qtimageformats
    buildsystem: cmake-ninja
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://invent.kde.org/qt/qt/qtimageformats.git
        commit: 882622945a55ee4ca8ac87e6fdcab2b9f1ade1a4
  - name: qttools
    buildsystem: cmake-ninja
    cleanup:
      - /bin/assistant
      - /bin/qhelpgenerator
      - /bin/qcollectiongenerator
      - /bin/qhelpconverter
      - /bin/pixeltool
      - /bin/designer
      - /bin/lrelease
      - /bin/lupdate
      - /bin/lconvert
      - /bin/linguist
      - /bin/qdoc
      - /bin/qtattributionsscanner
      - /bin/qtplugininfo
      - /bin/qtdiag
      - /bin/qdbusviewer
    sources:
      - type: git
        url: https://invent.kde.org/dkazakov/qttools.git
        commit: 5af29328f183c686fec96a6beba6b2728136cdc2
  - name: qtsvg
    buildsystem: cmake-ninja
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://invent.kde.org/qt/qt/qtsvg.git
        commit: a96fa8e059b4e969bc79c57a7328e297df138434
  - name: qttranslations
    buildsystem: cmake-ninja
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://invent.kde.org/qt/qt/qttranslations.git
        commit: fe446af4b8ac6b4a1b4126ff811e9871c4aaed4e
  - name: qt5compat
    buildsystem: cmake-ninja
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://invent.kde.org/dkazakov/qt5compat.git
        commit: 84c59db8288a4cff0585e8c1faa7f14ac9d68cc9
  - name: qtwayland
    buildsystem: cmake-ninja
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://invent.kde.org/dkazakov/qtwayland.git
        commit: 588a97543d85cbc9531bdbb91b3967f0a08255a5
  - name: qtshadertools
    buildsystem: cmake-ninja
    build-options:
      cxxflags: -include cstdint # Remove when bumped to ver with GCC 15 supported
    cleanup:
      - /bin
      - /lib/plugins/qmltooling
    sources:
      - type: git
        url: https://invent.kde.org/qt/qt/qtshadertools.git
        commit: 79c340e5632f3487c9fa08b9efedca4762c651ec
  - name: extra-cmake-modules
    buildsystem: cmake-ninja
    cleanup:
      - '*'
    config-opts:
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.7/extra-cmake-modules-6.7.0.tar.xz
        sha256: d81de82692d3d2bb77110332a65c8266252becc2c3f307ce814990ce5607b8dc
      - type: patch
        paths:
          - patches/extra-cmake-modules/0001-android-Disable-fastline-metadata-creation.patch
          - patches/extra-cmake-modules/0002-Android-Recursively-find-dependency-of-dependencies.patch
          - patches/extra-cmake-modules/0003-android-Fix-specifydependencies.cmake-to-handle-Qt6-.patch
          - patches/extra-cmake-modules/0004-windows-Revert-Use-BIN_INSTALL_DIR-data-for-DATAROOT.patch
          - patches/extra-cmake-modules/0005-android-Find-dependencies-of-manually-specified-libr.patch
          - patches/extra-cmake-modules/0001-Fix-QML-modules-to-be-rebuilt-all-the-time-with-Qt5.patch
  - name: kconfig
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
      - -DKCONFIG_USE_DBUS=OFF
    cleanup:
      - /bin
    sources:
