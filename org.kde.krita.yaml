        sha256: 555b5bc19546c3a791c69724e238c5d1710a9575cf8740012f8fc546f354122b
      - type: patch
        paths:
          - patches/ki18n/0001-ki18n-fix-loading-catalogs-with-patched-gettext.patch
          - patches/ki18n/0002-Ensure-langenv-string-is-null-terminated.patch
  - name: kitemmodels
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.7/kitemmodels-6.7.0.tar.xz
        sha256: 0aa0205323baf2d519ebb8f96ce7ed5524a8164a7440d905f977418bfbe6d349
  - name: kitemviews
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.7/kitemviews-6.7.0.tar.xz
        sha256: 5e635162993c9f1e15f3a1109ca3227d0d2ce57cf7070615651b65cf790db049
  - name: kimageformats
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
      - -DKIMAGEFORMATS_JXL=OFF
      - -DCMAKE_DISABLE_FIND_PACKAGE_OpenEXR=TRUE
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.7/kimageformats-6.7.0.tar.xz
        sha256: 722850648ac167e4c0ee631571fde49e9fd15d004a127dd804a14f9f579b731f
  - name: kwindowsystem
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.7/kwindowsystem-6.7.0.tar.xz
        sha256: 62c0f0b4a9507939d84aeeda55bbd4300b88c04e37953e5189b139003310a8f4
  - name: kcolorscheme
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.7/kcolorscheme-6.7.0.tar.xz
        sha256: 1b4c6e84f1dd96b2ee62be755f60da60d61ba80d6709eeb3186d8882e72e2130
  - name: kcrash
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.7/kcrash-6.7.0.tar.xz
        sha256: 1dc2c65d8ef62ef98457f8ab423b7686de3e713766c06e64d6322aa9db26eea4
  - name: plasma-wayland-protocols
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://github.com/KDE/plasma-wayland-protocols/archive/refs/tags/v1.13.0.tar.gz
        sha256: b4441a673cfb5dcdef921a2793b2dc6de6c4bed00ac005814376fc16caf1a016
  - name: pyqt
    buildsystem: simple
    build-commands:
      - sip-install --confirm-license --no-designer-plugin --no-qml-plugin --no-dbus-python
        --no-tools --verbose --target-dir ${FLATPAK_DEST}/lib/python3.10/site-packages
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://pypi.python.org/packages/source/P/PyQt5/PyQt5-5.15.7.tar.gz
        sha256: 755121a52b3a08cb07275c10ebb96576d36e320e572591db16cfdbc558101594
    modules:
      - name: sip
        buildsystem: simple
        build-commands:
          - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
            --prefix=${FLATPAK_DEST} "sip" --no-build-isolation
        cleanup:
          - /bin
        sources:
          - type: file
            url: https://pypi.python.org/packages/source/s/sip/sip-6.6.2.tar.gz
            sha256: 0e3efac1c5dfd8e525ae57140927df26993e13f58b89d1577c314f4105bfd90d
        modules:
          - name: python
            config-opts:
              - --enable-shared
            sources:
              - type: archive
                url: https://www.python.org/ftp/python/3.10.20/Python-3.10.20.tar.xz
                sha256: de6517421601e39a9a3bc3e1bc4c7b2f239297423ee05e282598c83ec0647505
                x-checker-data:
                  type: anitya
                  project-id: 13254
                  stable-only: true
                  versions:
                    <: '3.11'
                  url-template: https://www.python.org/ftp/python/$version/Python-$version.tar.xz
          - name: python-flit-core
            buildsystem: simple
            build-commands:
              - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
                --prefix=${FLATPAK_DEST} "flit_core" --no-build-isolation
            cleanup:
              - /bin
            sources:
              - type: file
                url: https://files.pythonhosted.org/packages/69/59/b6fc2188dfc7ea4f936cd12b49d707f66a1cb7a1d2c16172963534db741b/flit_core-3.12.0.tar.gz
                sha256: 18f63100d6f94385c6ed57a72073443e1a71a4acb4339491615d0f16d6ff01b2
                x-checker-data:
                  type: pypi
                  name: flit_core
          - name: python-packaging
            buildsystem: simple
            build-commands:
              - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
                --prefix=${FLATPAK_DEST} "packaging" --no-build-isolation
            cleanup:
              - /bin
            sources:
              - type: file
                url: https://files.pythonhosted.org/packages/65/ee/299d360cdc32edc7d2cf530f3accf79c4fca01e96ffc950d8a52213bd8e4/packaging-26.0.tar.gz
                sha256: 00243ae351a257117b6a241061796684b084ed1c516a08c48a3f7e147a9d80b4
                x-checker-data:
                  type: pypi
                  name: packaging
          - name: python-wheel
            buildsystem: simple
            build-commands:
              - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
                --prefix=${FLATPAK_DEST} "wheel" --no-build-isolation
            cleanup:
              - /bin
            sources:
              - type: file
                url: https://files.pythonhosted.org/packages/89/24/a2eb353a6edac9a0303977c4cb048134959dd2a51b48a269dfc9dde00c8a/wheel-0.46.3.tar.gz
                sha256: e3e79874b07d776c40bd6033f8ddf76a7dad46a7b8aa1b2787a83083519a1803
                x-checker-data:
                  type: pypi
                  name: wheel
          - name: python-ply
            buildsystem: simple
            build-commands:
              - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
                --prefix=${FLATPAK_DEST} "ply" --no-build-isolation
            cleanup:
              - /bin
            sources:
              - type: file
                url: https://files.pythonhosted.org/packages/e5/69/882ee5c9d017149285cab114ebeab373308ef0f874fcdac9beb90e0ac4da/ply-3.11.tar.gz
                sha256: 00c7c1aaa88358b9c765b6d3000c6eec0ba42abca5351b095321aef446081da3
                x-checker-data:
                  type: pypi
                  name: ply
          - name: python-toml
            buildsystem: simple
            build-commands:
              - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
                --prefix=${FLATPAK_DEST} "toml" --no-build-isolation
            cleanup:
